name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  build-data:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/checkout@v4
        with:
          repository: li-langverse/lic
          path: lic
          ref: main
        continue-on-error: true
      - name: Build library JSON
        run: |
          if [ ! -d lic/proof-db ] && [ -d ../lic-studio-ui/proof-db ]; then
            export LIC_ROOT=../lic-studio-ui
          elif [ -d lic/proof-db ]; then
            export LIC_ROOT=lic
          else
            echo "No lic checkout with proof-db — using committed data/library.json"
            test -s data/library.json
            exit 0
          fi
          python3 scripts/build-library.py
          python3 scripts/build-posture.py
      - name: Verify library.json
        run: test -s data/library.json

  build-web:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: cd web && npm ci && npm run build
