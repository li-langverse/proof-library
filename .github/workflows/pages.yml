name: Deploy proof library site

on:
  push:
    branches: [main]
    paths:
      - "web/**"
      - "data/**"
      - "scripts/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: proof-library-pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install and build site
        working-directory: web
        env:
          # Custom domain proofs.lilangverse.xyz serves at site root (no /proof-library prefix).
          NEXT_PUBLIC_BASE_PATH: ""
        run: |
          npm ci
          npm run build
          mkdir -p out/data
          cp ../data/library.json out/data/ 2>/dev/null || true
          cp ../data/posture.json out/data/ 2>/dev/null || true
          echo "proofs.lilangverse.xyz" > out/CNAME

      - name: Verify artifact
        run: test -s web/out/index.html

      - uses: actions/upload-pages-artifact@v3
        with:
          path: web/out

  deploy:
    needs: build
    runs-on: ubuntu-24.04
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
